<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>All articles · siamese.wiki</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="Browse all 30 articles on siamese.wiki — colors, behavior, health, history." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,400..600&family=Source+Serif+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="site.css?v=4" />
<link rel="icon" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23c56b4a'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='Fraunces,serif' font-size='18' font-weight='500' fill='%23fbf6ec'%3ES%3C/text%3E%3C/svg%3E" />
</head>
<body>
<div id="chrome-header"></div>

<main class="wrap" style="padding: 60px 24px 40px;">
  <div style="font-family: var(--f-ui); font-size: 12.5px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--point-deep); margin-bottom: 12px;">ALL articles</div>
  <h1 style="font-size: clamp(40px, 5vw, 64px); font-weight: 400; letter-spacing: -0.02em; margin: 0;">Everything we've written<br>about Siamese cats.</h1>
  <p class="text-soft" style="max-width: 640px; font-size: 18px; margin-top: 18px;">
    Thirty articles organized by topic. Every claim is sourced. Health articles carry their own disclaimers and are written conservatively.
  </p>
  
  <div class="searchbox" style="margin: 40px 0 20px;">
    <span style="color:var(--ink-faint); font-size:15px;">🔍</span>
    <input id="search" placeholder="Search titles, topics, questions…" autofocus />
    <span class="shortcut mono" id="resultCount"></span>
  </div>
</main>

<main class="wrap" id="content" style="padding-bottom: 60px;"></main>

<div id="chrome-footer"></div>

<script src="site.js?v=4"></script>
<script src="thumbs.js?v=4"></script>
<script>
(async () => {
  renderChrome('articles');
  const m = await getManifest();
  
  const catOrder = ['Overview', 'Colors & Points', 'Behavior & Personality', 'Care & Diet', 'Health', 'History & Culture'];
  
  function render(filter = '') {
    const f = filter.toLowerCase().trim();
    const filtered = f ? m.filter(a =>
      (a.title + ' ' + (a.deck||'') + ' ' + (a.quickAnswer||'') + ' ' + a.category).toLowerCase().includes(f)
    ) : m;
    
    document.getElementById('resultCount').textContent = f ? `${filtered.length} found` : '';
    
    if (filtered.length === 0) {
      document.getElementById('content').innerHTML = `<div class="empty">No articles match "${filter}". <a href="articles.html" style="color:var(--point-deep); margin-left:8px;">Show all →</a></div>`;
      return;
    }
    
    const byCategory = {};
    for (const a of filtered) {
      byCategory[a.category] = byCategory[a.category] || [];
      byCategory[a.category].push(a);
    }
    
    const html = catOrder.filter(c => byCategory[c]).map(c => {
      const items = byCategory[c];
      return `
        <section class="section" id="${categorySlug(c)}" style="padding: 30px 0 10px;">
          <div class="section-head" style="margin-bottom:20px;">
            <h2 style="font-size:28px; margin:0;">${c} <span style="font-family:var(--f-ui); font-size:13px; color:var(--ink-faint); font-weight:400; letter-spacing:0.05em; margin-left:8px;">${items.length} article${items.length>1?'s':''}</span></h2>
          </div>
          <div class="featured-grid" style="grid-template-columns: repeat(3, 1fr); gap:16px;">
            ${items.map(a => `
              <a class="card compact" href="${articleHref(a)}" data-cat="${a.category}" style="padding: 22px;">
                <div class="thumb">${Thumbs.thumbHtml(a)}</div>
                <div class="meta"><span class="mono" style="font-size:11px; color:var(--ink-faint);">#${String(a.num).padStart(2,'0')}</span><span>${readingLabel(a)}</span></div>
                <h3 style="font-size:20px; line-height:1.22;">${a.title}</h3>
                <p style="font-size:14.5px; line-height:1.5;">${(a.deck || a.quickAnswer).substring(0, 140)}${(a.deck || a.quickAnswer).length > 140 ? '…' : ''}</p>
              </a>
            `).join('')}
          </div>
        </section>
      `;
    }).join('');
    
    document.getElementById('content').innerHTML = html;
  }
  
  const input = document.getElementById('search');
  input.addEventListener('input', e => render(e.target.value));
  
  // URL ?q=
  const q = new URLSearchParams(location.search).get('q');
  if (q) { input.value = q; render(q); } else { render(); }
  
  // Scroll to hash after render
  if (location.hash) {
    setTimeout(() => {
      const el = document.querySelector(location.hash);
      if (el) el.scrollIntoView ? window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 80, behavior: 'smooth' }) : null;
    }, 100);
  }
})();
</script>
</body>
</html>
