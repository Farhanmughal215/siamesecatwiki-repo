<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Loading… · siamese.wiki</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,400..600&family=Source+Serif+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="site.css?v=4" />
<link rel="icon" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23c56b4a'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='Fraunces,serif' font-size='18' font-weight='500' fill='%23fbf6ec'%3ES%3C/text%3E%3C/svg%3E" />
<style>
  sup.fn {
    font-family: var(--f-ui); font-size: 10.5px; font-weight: 600;
    color: var(--point-deep);
    margin: 0 2px;
    vertical-align: super;
    line-height: 0;
  }
</style>
</head>
<body>
<div id="chrome-header"></div>

<main class="wrap">
  <div class="article-layout">
    <article id="article">
      <div class="empty">Loading article…</div>
    </article>
    
    <aside class="sidebar" id="sidebar"></aside>
  </div>
</main>

<div id="chrome-footer"></div>

<script src="site.js?v=4"></script>
<script src="thumbs.js?v=4"></script>
<script>
(async () => {
  renderChrome('articles');
  
  const slug = new URLSearchParams(location.search).get('slug');
  if (!slug) {
    document.getElementById('article').innerHTML = '<div class="empty">No article selected. <a href="articles.html" style="color:var(--point-deep);">Browse all →</a></div>';
    return;
  }
  
  const m = await getManifest();
  const meta = m.find(a => a.slug === slug);
  if (!meta) {
    document.getElementById('article').innerHTML = '<div class="empty">Article not found.</div>';
    return;
  }
  
  // Update page meta
  document.title = meta.title + ' · siamese.wiki';
  
  // Fetch article markdown
  const r = await fetch(`../articles/${meta.file}`);
  const md = await r.text();
  
  // Split off title + deck + quick-answer for custom rendering
  // Strategy: render full md first, then prepend our custom header
  const lines = md.split('\n');
  let i = 0;
  
  // Skip H1
  if (lines[i] && lines[i].startsWith('# ')) i++;
  // Skip blank lines
  while (i < lines.length && lines[i].trim() === '') i++;
  // Skip deck (italic line)
  let deck = meta.deck;
  if (lines[i] && /^\*.+\*$/.test(lines[i].trim())) {
    i++;
  }
  while (i < lines.length && lines[i].trim() === '') i++;
  
  // Render the rest
  const bodyMd = lines.slice(i).join('\n');
  const bodyHtml = renderMarkdown(bodyMd);
  
  // Build header
  const tier = meta.ctaTier;
  const tierLabel = tier === 'loud' ? 'General · behavioral topic' : tier === 'subtle' ? 'Health topic · written conservatively' : 'General reference';
  
  const headerHtml = `
    <figure class="article-hero">${Thumbs.thumbHtml(meta, { wide: true })}</figure>
    <div class="article-head">
      <div class="crumbs">
        <a href="index.html">siamese.wiki</a>
        <span style="margin: 0 6px; color:var(--ink-faint);">/</span>
        <a href="articles.html#${categorySlug(meta.category)}">${meta.category}</a>
        <span style="margin: 0 6px; color:var(--ink-faint);">/</span>
        <span style="color:var(--ink-faint);">#${String(meta.num).padStart(2,'0')}</span>
      </div>
      <h1>${meta.title}</h1>
      ${deck ? `<p class="deck">${deck.replace(/\*\*/g, '')}</p>` : ''}
      <div class="byline">
        <span class="pill">${meta.category}</span>
        <span>${meta.readingMins} min read · ${meta.words.toLocaleString()} words</span>
        <span style="color:var(--ink-rule);">•</span>
        <span class="tier" style="color:var(--ink-faint);">${tierLabel}</span>
      </div>
    </div>
  `;
  
  document.getElementById('article').innerHTML = headerHtml + `<div class="prose">${bodyHtml}</div>` + buildArticleFoot(meta, m);
  
  // Build sidebar: TOC + mini CTA (if loud) + related
  buildSidebar(meta, m);
  
  // Smooth scroll + active TOC
  setupToc();
})();

function buildArticleFoot(meta, manifest) {
  // Keep reading: 3 from same category excluding self, else filler
  let related = manifest.filter(a => a.category === meta.category && a.slug !== meta.slug).slice(0, 3);
  if (related.length < 3) {
    const more = manifest.filter(a => a.slug !== meta.slug && !related.includes(a)).slice(0, 3 - related.length);
    related = related.concat(more);
  }
  
  const keepHtml = `
    <section class="keep-reading">
      <h3>Keep reading</h3>
      <div class="keep-grid">
        ${related.map(a => `
          <a class="card compact" href="${articleHref(a)}" data-cat="${a.category}" style="padding: 20px;">
            <div class="thumb">${Thumbs.thumbHtml(a)}</div>
            <div class="meta"><span class="pill">${a.category}</span><span>${readingLabel(a)}</span></div>
            <h3 style="font-size: 18px; line-height: 1.22;">${a.title}</h3>
          </a>
        `).join('')}
      </div>
    </section>
  `;
  
  // Tier-based footer CTA
  let ctaHtml;
  if (meta.ctaTier === 'subtle') {
    ctaHtml = `
      <div class="cta-subtle">
        <span style="color:var(--ink-faint);">This article is independent of our sponsor.</span>
        <span style="flex:1;"></span>
        <span>Sponsored by Siamese Cat Café in Bangna, Bangkok.</span>
        <a href="${MAPS_URL}" target="_blank" rel="noopener">Open Google Maps →</a>
      </div>
    `;
  } else {
    ctaHtml = `
      <div class="cta-footer">
        <div>
          <div class="label">Sponsored · meet a real Siamese</div>
          <h3>${meta.ctaTier === 'loud' ? 'In Bangkok this week?' : 'Sixteen Siamese cats live in Bangkok.'}</h3>
          <p>This wiki is supported by Siamese Cat Café in Bangna. ${meta.ctaTier === 'loud' ? '16 rescued Siamese cats live at the café — free entry, every day. Come say hi.' : 'If you\'re passing through Bangkok, come meet them.'}</p>
          <div class="hours">Open daily · 8 AM – 9 PM · Free entry · Bangna, Bangkok</div>
        </div>
        <a class="map-btn" href="${MAPS_URL}" target="_blank" rel="noopener">
          Open in Google Maps →
        </a>
      </div>
    `;
  }
  
  return keepHtml + ctaHtml;
}

function buildSidebar(meta, manifest) {
  const h2s = document.querySelectorAll('#article .prose h2');
  const tocItems = [...h2s].map(h => ({ id: h.id, text: h.textContent }));
  
  const miniCta = meta.ctaTier === 'loud' ? `
    <div class="sidebar-block">
      <div class="cta-mini">
        <div class="label">🧡 Sponsored</div>
        <h4>Meet a real Siamese in Bangkok</h4>
        <p>16 rescued Siamese cats live at our sponsor café. Free entry, 8 AM – 9 PM daily.</p>
        <a class="btn btn-primary" href="${MAPS_URL}" target="_blank" rel="noopener" style="width:100%; justify-content:center;">Open Maps →</a>
      </div>
    </div>
  ` : '';
  
  const tocHtml = tocItems.length ? `
    <div class="sidebar-block">
      <h4>On this page</h4>
      <ul class="toc">
        ${tocItems.map(t => `<li><a href="#${t.id}" data-target="${t.id}">${t.text}</a></li>`).join('')}
      </ul>
    </div>
  ` : '';
  
  document.getElementById('sidebar').innerHTML = miniCta + tocHtml;
}

function setupToc() {
  const links = document.querySelectorAll('.toc a');
  const headings = [...document.querySelectorAll('.prose h2')];
  
  function onScroll() {
    const y = window.scrollY + 120;
    let active = null;
    for (const h of headings) {
      if (h.offsetTop <= y) active = h.id;
    }
    links.forEach(a => a.classList.toggle('active', a.dataset.target === active));
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();
  
  links.forEach(a => a.addEventListener('click', e => {
    const id = a.dataset.target;
    const el = document.getElementById(id);
    if (el) {
      e.preventDefault();
      window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 72, behavior: 'smooth' });
      history.pushState(null, '', '#' + id);
    }
  }));
}
</script>
</body>
</html>
